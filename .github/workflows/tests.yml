name: tests

# Gates every PR (including the automated bump PRs from jbearak/raven) by
# actually auditing, installing, and running the formula on Apple Silicon
# before it can merge. A formula that doesn't install never reaches the fleet.
#
# Mark this workflow as a required status check on the `main` branch
# (Settings > Branches) so bump PRs can't merge red.
#
# Homebrew/actions/setup-homebrew auto-taps the checked-out repo as
# jbearak/raven, so there is intentionally no explicit `brew tap` step — adding
# one fails with "Tap remote mismatch".

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # macos-14 = Apple Silicon (arm64). The formula is arm64-only.
    runs-on: macos-14
    steps:
      - name: Checkout tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit
        run: brew audit --strict --online jbearak/raven/raven

      - name: Install
        run: brew install --verbose jbearak/raven/raven

      - name: Test
        run: brew test --verbose jbearak/raven/raven

      - name: Smoke check
        run: raven --version
